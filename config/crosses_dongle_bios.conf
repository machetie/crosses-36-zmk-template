CONFIG_ZMK_SLEEP=n

# USB HID boot protocol for BIOS/GRUB support
CONFIG_ZMK_USB_BOOT=y
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=n
# Initialize USB at system boot so BIOS/GRUB sees the keyboard in time
# to latch boot-protocol; default is n which delays enumeration.
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y

# Composite descriptor intentionally kept minimal (keyboard + consumer only).
# ZMK_POINTING is disabled via Kconfig.defconfig; do not re-enable here.

# BLE settings must mirror crosses_left.conf / crosses_right.conf so the
# split central <-> peripheral link negotiates cleanly after a settings reset.
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_CONN_RSSI=y
CONFIG_BT_CTLR_TX_PWR_DYNAMIC_CONTROL=y
CONFIG_BT_CTLR_PHY_2M=y
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# Host battery reporting proxy (split peripherals -> central -> host)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
