CONFIG_ZMK_SLEEP=n

# USB HID boot protocol for BIOS/GRUB support
CONFIG_ZMK_USB_BOOT=y
CONFIG_ZMK_HID_REPORT_TYPE_NKRO=n
# NOTE: CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT must NOT be set — it fires USB_DC_CONFIGURED
# before ZMK's usb_status_cb is registered, leaving is_configured=false permanently,
# which causes zmk_usb_is_hid_ready() to return false and blocks all USB HID output.

# BLE settings — must mirror crosses_left.conf / crosses_right.conf for the
# split central <-> peripheral link to negotiate cleanly.
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_CONN_RSSI=y
CONFIG_BT_CTLR_TX_PWR_DYNAMIC_CONTROL=y
CONFIG_BT_CTLR_PHY_2M=y
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

CONFIG_INPUT=y
# ZMK defaults: MOUSE=20, KEYBOARD=20 — no overrides needed here
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
CONFIG_ZMK_INPUT_PROCESSOR_REPORT_RATE_LIMIT=y
# Module default is 8ms; use ZMK_BLE_THREAD_STACK_SIZE (official knob) instead of the
# generic Zephyr SYSTEM_WORKQUEUE_STACK_SIZE to scope the fix to the BLE notify thread.
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=2048

CONFIG_ZMK_DISPLAY=y

# LVGL Display Configuration for Zephyr 4.1
CONFIG_LV_USE_DRAW_SW=y
CONFIG_LV_DRAW_SW_COMPLEX=y

CONFIG_DONGLE_SCREEN_LAYER_ACTIVE=y
CONFIG_DONGLE_SCREEN_LAYER_ROLLER=y
CONFIG_DONGLE_SCREEN_MODIFIER_ACTIVE=y
CONFIG_DONGLE_SCREEN_OUTPUT_ACTIVE=y
CONFIG_DONGLE_SCREEN_BATTERY_ACTIVE=y

# Replace WPM widget with Bongo Cat
CONFIG_DONGLE_SCREEN_WPM_ACTIVE=n
CONFIG_DONGLE_SCREEN_BONGO_CAT=y

# BATTERY_LEVEL_FETCHING already enabled by zmk-dongle-screen's dongle_screen.conf;
# only the proxy needs to be explicitly enabled here for host battery reporting.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# YADS Brightness Control
CONFIG_DONGLE_SCREEN_MAX_BRIGHTNESS=80
CONFIG_DONGLE_SCREEN_MIN_BRIGHTNESS=1
CONFIG_DONGLE_SCREEN_DEFAULT_BRIGHTNESS=10
CONFIG_DONGLE_SCREEN_BRIGHTNESS_STEP=10
CONFIG_DONGLE_SCREEN_IDLE_TIMEOUT_S=6000

# Keyboard brightness control (requires keyboard keycodes, not consumer codes)
CONFIG_DONGLE_SCREEN_BRIGHTNESS_KEYBOARD_CONTROL=y
CONFIG_DONGLE_SCREEN_BRIGHTNESS_UP_KEYCODE=115
CONFIG_DONGLE_SCREEN_BRIGHTNESS_DOWN_KEYCODE=114
CONFIG_DONGLE_SCREEN_TOGGLE_KEYCODE=113
